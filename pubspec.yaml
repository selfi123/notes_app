name: voicecard
description: "Save audio and text notes for your contacts."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  path_provider: ^2.1.5

  # Audio
  record: ^6.0.0
  just_audio: ^0.9.44
  audio_session: ^0.1.21
  permission_handler: ^11.3.1

  # Notifications & Scheduling
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  flutter_timezone: ^5.1.0

  # Contacts
  flutter_contacts: ^1.1.9+2

  # Cloud (Backend API integration)
  http: ^1.2.0
  # Payments

  # Environment variables
  flutter_dotenv: ^5.2.1

  # UI & Fonts
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  animations: ^2.0.11
  flutter_animate: ^4.5.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  google_sign_in: ^6.2.2
  in_app_purchase: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 21
